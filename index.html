<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Tetris Extension</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.5; }
    code { background: #f1f1f1; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Simple Tetris Chrome Extension</h1>
  <p>This repository now contains a Chrome extension.</p>
  <ol>
    <li>Open <code>chrome://extensions</code>.</li>
    <li>Enable <strong>Developer mode</strong>.</li>
    <li>Click <strong>Load unpacked</strong> and select this folder.</li>
    <li>Open the extension popup to play Tetris.</li>
  </ol>
</body>
</html>
