<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Tetris</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .game-wrap {
      display: grid;
      grid-template-columns: auto 180px;
      gap: 20px;
      align-items: start;
    }
    canvas {
      border: 2px solid #666;
      background: #1a1a1a;
      image-rendering: pixelated;
    }
    .panel {
      background: #1b1b1b;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 14px;
      line-height: 1.5;
    }
    .panel h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }
    .score {
      font-size: 1.1rem;
      margin-bottom: 10px;
    }
    kbd {
      background: #333;
      border: 1px solid #666;
      border-radius: 4px;
      padding: 1px 5px;
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <canvas id="board" width="300" height="600" aria-label="Tetris board"></canvas>
    <aside class="panel">
      <h1>Simple Tetris</h1>
      <div class="score">Score: <span id="score">0</span></div>
      <div>Controls:</div>
      <ul>
        <li><kbd>←</kbd> / <kbd>→</kbd> Move</li>
        <li><kbd>↓</kbd> Soft drop</li>
        <li><kbd>↑</kbd> Rotate</li>
        <li><kbd>Space</kbd> Hard drop</li>
      </ul>
      <p>Refresh page to restart after game over.</p>
    </aside>
  </div>

  <script>
    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;
    const boardCanvas = document.getElementById('board');
    const ctx = boardCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    const colors = [
      null,
      '#00f0f0', '#f0f000', '#a000f0', '#00f000',
      '#f00000', '#0000f0', '#f0a000'
    ];

    const SHAPES = [
      [],
      [[1,1,1,1]],
      [[2,2],[2,2]],
      [[0,3,0],[3,3,3]],
      [[0,4,4],[4,4,0]],
      [[5,5,0],[0,5,5]],
      [[6,0,0],[6,6,6]],
      [[0,0,7],[7,7,7]]
    ];

    const board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

    let score = 0;
    let dropCounter = 0;
    let dropInterval = 700;
    let lastTime = 0;
    let gameOver = false;

    const player = {
      x: 0,
      y: 0,
      matrix: null,
    };

    function createPiece() {
      const type = (Math.random() * 7 | 0) + 1;
      return SHAPES[type].map(row => [...row]);
    }

    function collide(arena, p) {
      const [m, o] = [p.matrix, {x: p.x, y: p.y}];
      for (let y = 0; y < m.length; y++) {
        for (let x = 0; x < m[y].length; x++) {
          if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
            return true;
          }
        }
      }
      return false;
    }

    function merge(arena, p) {
      p.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            arena[y + p.y][x + p.x] = value;
          }
        });
      });
    }

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            ctx.fillStyle = colors[value];
            ctx.fillRect((x + offset.x) * BLOCK, (y + offset.y) * BLOCK, BLOCK, BLOCK);
            ctx.strokeStyle = '#121212';
            ctx.strokeRect((x + offset.x) * BLOCK, (y + offset.y) * BLOCK, BLOCK, BLOCK);
          }
        });
      });
    }

    function draw() {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
      drawMatrix(board, {x: 0, y: 0});
      if (!gameOver) drawMatrix(player.matrix, {x: player.x, y: player.y});

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.72)';
        ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', boardCanvas.width / 2, boardCanvas.height / 2);
      }
    }

    function rotate(matrix) {
      return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
    }

    function playerRotate() {
      const previousX = player.x;
      player.matrix = rotate(player.matrix);
      let offset = 1;
      while (collide(board, player)) {
        player.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
          player.matrix = rotate(rotate(rotate(player.matrix)));
          player.x = previousX;
          return;
        }
      }
    }

    function sweepRows() {
      outer: for (let y = board.length - 1; y >= 0; y--) {
        for (let x = 0; x < board[y].length; x++) {
          if (board[y][x] === 0) continue outer;
        }
        const row = board.splice(y, 1)[0].fill(0);
        board.unshift(row);
        y++;
        score += 100;
      }
      scoreEl.textContent = String(score);
    }

    function playerDrop() {
      player.y++;
      if (collide(board, player)) {
        player.y--;
        merge(board, player);
        sweepRows();
        playerReset();
      }
      dropCounter = 0;
    }

    function playerHardDrop() {
      while (!collide(board, player)) {
        player.y++;
      }
      player.y--;
      merge(board, player);
      sweepRows();
      playerReset();
      dropCounter = 0;
    }

    function playerMove(dir) {
      player.x += dir;
      if (collide(board, player)) player.x -= dir;
    }

    function playerReset() {
      player.matrix = createPiece();
      player.y = 0;
      player.x = ((COLS / 2) | 0) - ((player.matrix[0].length / 2) | 0);
      if (collide(board, player)) {
        gameOver = true;
      }
    }

    function update(time = 0) {
      const delta = time - lastTime;
      lastTime = time;
      if (!gameOver) {
        dropCounter += delta;
        if (dropCounter > dropInterval) playerDrop();
      }
      draw();
      requestAnimationFrame(update);
    }

    document.addEventListener('keydown', (event) => {
      if (gameOver) return;
      if (event.key === 'ArrowLeft') playerMove(-1);
      else if (event.key === 'ArrowRight') playerMove(1);
      else if (event.key === 'ArrowDown') playerDrop();
      else if (event.key === 'ArrowUp') playerRotate();
      else if (event.code === 'Space') playerHardDrop();
    });

    playerReset();
    update();
  </script>
</body>
</html>
